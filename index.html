<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="money.css">
    <title>Currency converter</title>
</head>
<body>

    <p class="converter">Welcome to 💱 Currency converter</p>

    <input type="number" id="AmountOfMoney" placeholder="Amount">

    <select id="SelectCurrencyNameFrom" class="currency-row"></select>
    <select id="SelectCurrencyNameTo" class="currency-row"></select>

    
    <button id="convBtn">Convert</button>

    <div id="result" style="display: none;">
        <input type="text" id="resultEnter" class="currency-row" disabled>
        <input type="text" id="resultExit" class="currency-row" disabled>
    </div>

    <div id="PopupNotification" class="popup"></div>

    <script src="money.js"></script>
</body>
</html>
